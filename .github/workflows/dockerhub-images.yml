name: dockerhub-images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        type: string
        default: "main"
      image_tag:
        description: "Docker image tag for manual runs (defaults to branch name)"
        required: false
        type: string
      push_latest:
        description: "Also publish latest tag"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: dockerhub-images-${{ github.ref_name }}-${{ inputs.branch || '' }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      is_prerelease: ${{ steps.vars.outputs.is_prerelease }}
      publish_latest: ${{ steps.vars.outputs.publish_latest }}
      checkout_ref: ${{ steps.vars.outputs.checkout_ref }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

      - name: Prepare image metadata
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            CHECKOUT_REF="${INPUT_BRANCH}"
            if [[ -z "${CHECKOUT_REF}" ]]; then
              echo "Manual runs require a branch." >&2
              exit 1
            fi

            IMAGE_TAG="${INPUT_IMAGE_TAG}"
            if [[ -z "${IMAGE_TAG}" ]]; then
              IMAGE_TAG="${CHECKOUT_REF}"
            fi
            PUBLISH_LATEST="${INPUT_PUSH_LATEST}"
          else
            CHECKOUT_REF="${GITHUB_REF_NAME}"
            IMAGE_TAG="${REF_NAME}"
            if [[ "${IMAGE_TAG}" == *-* ]]; then
              PUBLISH_LATEST="false"
            else
              PUBLISH_LATEST="true"
            fi
          fi

          if [[ "${IMAGE_TAG}" == *-* ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          IMAGE_TAG="$(echo "${IMAGE_TAG}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9_.-]+#-#g; s#^-+##; s#-+$##')"
          if [[ -z "${IMAGE_TAG}" ]]; then
            echo "Image tag is empty after normalization." >&2
            exit 1
          fi

          echo "checkout_ref=${CHECKOUT_REF}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "is_prerelease=${IS_PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "publish_latest=${PUBLISH_LATEST}" >> "${GITHUB_OUTPUT}"

  dockerhub-precheck:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Validate Docker Hub credentials and repositories
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" ]]; then
            echo "Missing secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi
          if [[ -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "Missing secret DOCKERHUB_TOKEN." >&2
            exit 1
          fi

          USERNAME_LC="$(echo "${DOCKERHUB_USERNAME}" | tr '[:upper:]' '[:lower:]')"
          NAMESPACE="$(echo "${DOCKERHUB_NAMESPACE}" | tr '[:upper:]' '[:lower:]')"
          if [[ -z "${NAMESPACE}" ]]; then
            echo "Missing Docker Hub namespace. Set variable DOCKERHUB_NAMESPACE or secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi
          echo "Docker Hub username: ${DOCKERHUB_USERNAME}"
          echo "Docker Hub namespace: ${NAMESPACE}"
          if [[ "${USERNAME_LC}" != "${NAMESPACE}" ]]; then
            echo "::warning::Namespace (${NAMESPACE}) differs from username (${USERNAME_LC}). Ensure this user has write access to that namespace."
          fi

          AUTH_RESPONSE="$(curl -fsSL -X POST https://hub.docker.com/v2/users/login/ -H 'Content-Type: application/json' -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}")"
          JWT_TOKEN="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["token"])' <<<"${AUTH_RESPONSE}")"
          if [[ -z "${JWT_TOKEN}" ]]; then
            echo "Failed to acquire Docker Hub JWT token." >&2
            exit 1
          fi

          for repo in infinitum-app infinitum-worker; do
            API_URL="https://hub.docker.com/v2/repositories/${NAMESPACE}/${repo}/"
            HTTP_STATUS="$(curl -sS -o /tmp/dockerhub-repo-check.json -w "%{http_code}" -H "Authorization: JWT ${JWT_TOKEN}" "${API_URL}")"
            if [[ "${HTTP_STATUS}" != "200" ]]; then
              echo "Cannot access docker.io/${NAMESPACE}/${repo} (HTTP ${HTTP_STATUS})." >&2
              echo "Please confirm repository exists and ${DOCKERHUB_USERNAME} has write permission." >&2
              cat /tmp/dockerhub-repo-check.json >&2 || true
              exit 1
            fi
          done

          echo "Docker Hub precheck passed."

  publish-images:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - dockerhub-precheck
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            target: app-runner
            image: infinitum-app
            cache_scope: app
          - name: worker
            target: worker-runner
            image: infinitum-worker
            cache_scope: worker
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Hub namespace
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          NAMESPACE="$(echo "${DOCKERHUB_NAMESPACE}" | tr '[:upper:]' '[:lower:]')"
          if [[ -z "${NAMESPACE}" ]]; then
            echo "Missing Docker Hub namespace. Set variable DOCKERHUB_NAMESPACE or secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          USERNAME_LC="$(echo "${DOCKERHUB_USERNAME}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${USERNAME_LC}" != "${NAMESPACE}" ]]; then
            echo "::warning::Namespace (${NAMESPACE}) differs from username (${USERNAME_LC}). Ensure this user has write access to that namespace."
          fi

          echo "namespace=${NAMESPACE}" >> "${GITHUB_OUTPUT}"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ steps.dockerhub.outputs.namespace }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=raw,value=sha-${{ needs.prepare.outputs.short_sha }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.publish_latest == 'true' }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.cache_scope }}
            type=registry,ref=docker.io/${{ steps.dockerhub.outputs.namespace }}/${{ matrix.image }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.cache_scope }}
            type=registry,ref=docker.io/${{ steps.dockerhub.outputs.namespace }}/${{ matrix.image }}:buildcache,mode=max
